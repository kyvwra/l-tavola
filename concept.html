<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONCEPT | L'TAVOLA</title>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #b2945e; --font-heading: 'Marcellus', serif; --font-body: 'Montserrat', sans-serif; --bg-dark: #1a1a1a; }
    * { margin: 0; padding: 0; box-sizing: border-box; text-decoration: none !important; }
    body { background-color: var(--bg-dark); font-family: var(--font-body); color: #fff; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

    .navbar { position: fixed; top: 0; width: 100%; padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(26, 26, 26, 0.95); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .nav-logo { font-family: var(--font-heading); font-size: 1.1rem; letter-spacing: 5px; color: #fff; text-transform: uppercase; }
    .nav-links { display: flex; align-items: center; }
    .nav-text { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #fff; margin-left: 25px; font-weight: 500; }
    .lang-btn { background: transparent; border: 1px solid #fff; padding: 5px 10px; cursor: pointer; font-size: 0.55rem; margin-left: 20px; color: #fff; }

    .concept-hero { padding-top: 180px; padding-bottom: 80px; text-align: center; }
    .hero-title { font-family: var(--font-heading); font-size: clamp(2rem, 10vw, 3.5rem); letter-spacing: 12px; text-transform: uppercase; color: #fff; }

    .concept-container { max-width: 900px; margin: 0 auto; padding: 0 5% 100px; text-align: center; }
    .concept-section { margin-bottom: 100px; }
    .concept-section h2 { font-family: var(--font-heading); font-size: 2rem; color: var(--gold); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 4px; }
    .concept-section p { font-size: 1rem; line-height: 2.2; color: #aaa; text-align: justify; }

    .quote-section { padding: 80px 10%; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 100px; }
    .quote-section p { font-family: var(--font-heading); font-size: 1.6rem; color: #fff; font-style: italic; }

    .final-action { text-align: center; padding-bottom: 100px; }
    .btn-gold { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 18px 45px; font-family: var(--font-heading); font-size: 0.9rem; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; transition: 0.4s; }

    /* CSS GALERIE REPARAT */
    .gallery-modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); opacity: 0; transition: 0.5s; justify-content: center; align-items: center; }
    .gallery-modal.show { display: flex !important; opacity: 1; }
    .slideshow-container { width: 85%; height: 80vh; position: relative; display: flex; justify-content: center; align-items: center; }
    
    /* Forțăm vizibilitatea slide-urilor */
    .slide { position: absolute; top:0; left:0; width:100%; height:100%; display: none; justify-content: center; align-items: center; }
    .slide.active { display: flex !important; }
    .slide img { max-height: 100%; max-width: 100%; object-fit: contain; }
    
    .close-btn { position: absolute; top: 30px; right: 30px; color: var(--gold); font-size: 40px; cursor: pointer; z-index: 3001; }
    .prev, .next { position: absolute; top: 50%; color: var(--gold); font-size: 40px; cursor: pointer; padding: 20px; transform: translateY(-50%); z-index: 3000; user-select: none; }
    .prev { left: -60px; } .next { right: -60px; }

    @media (max-width: 850px) {
        .navbar { flex-direction: column; align-items: center; padding: 20px 5%; gap: 15px; }
        .nav-links { justify-content: center; width: 100%; }
        .nav-text, .lang-btn { margin: 0 10px; }
        .slideshow-container { width: 95%; }
        .prev { left: 0; } .next { right: 0; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">L'TAVOLA</a>
    <div class="nav-links">
      <a href="index.html" class="nav-text" data-ro="Acasă" data-en="Home">Acasă</a>
      <a href="menu.html" class="nav-text" data-ro="Meniu" data-en="Menu">Meniu</a>
      <button id="lang-switch" class="lang-btn">EN</button>
    </div>
  </nav>

  <header class="concept-hero">
    <h1 class="hero-title" data-ro="CONCEPT" data-en="CONCEPT">CONCEPT</h1>
  </header>

  <main class="concept-container">
    <div class="concept-section">
        <h2 data-ro="Rădăcini și Timp" data-en="Roots and Time">Rădăcini și Timp</h2>
        <p data-ro="Povestea noastră nu a început în bucătărie..." data-en="Our story didn't begin in a kitchen...">Povestea noastră nu a început în bucătărie...</p>
    </div>

    <div class="quote-section">
        <p>„Gastronomia este puntea fragilă între pământ și amintire.”</p>
    </div>

    <div class="final-action">
        <button id="open-gallery-btn" class="btn-gold" data-ro="Explorează Galeria" data-en="Explore Gallery">Explorează Galeria</button>
    </div>
  </main>

  <div id="gallery-modal" class="gallery-modal">
    <span class="close-btn">&times;</span>
    <div class="slideshow-container">
        <div class="slide active"><img src="imagini-galerie/1.png" alt="1"></div>
        <div class="slide"><img src="imagini-galerie/2.png" alt="2"></div>
        <div class="slide"><img src="imagini-galerie/3.png" alt="3"></div>
        <div class="slide"><img src="imagini-galerie/4.png" alt="4"></div>
        <div class="slide"><img src="imagini-galerie/5.png" alt="5"></div>
        <a class="prev" id="prev-slide">&#10094;</a>
        <a class="next" id="next-slide">&#10095;</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Limbă
        const langBtn = document.getElementById('lang-switch');
        langBtn.onclick = () => {
            const isRo = langBtn.innerText === 'EN';
            langBtn.innerText = isRo ? 'RO' : 'EN';
            document.querySelectorAll('[data-ro]').forEach(el => {
                el.innerText = el.getAttribute('data-' + (isRo ? 'en' : 'ro'));
            });
        };

        // Galerie - LOGICĂ REPARATĂ
        const modal = document.getElementById('gallery-modal');
        const openBtn = document.getElementById('open-gallery-btn');
        const closeBtn = document.querySelector('.close-btn');
        const slides = document.querySelectorAll('.slide');
        let currentIdx = 0;

        openBtn.addEventListener('click', () => {
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
            document.body.style.overflow = 'hidden';
            updateSlides();
        });

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 500);
            document.body.style.overflow = '';
        });

        function updateSlides() {
            slides.forEach((slide, index) => {
                slide.style.display = (index === currentIdx) ? 'flex' : 'none';
                if(index === currentIdx) slide.classList.add('active');
                else slide.classList.remove('active');
            });
        }

        document.getElementById('prev-slide').onclick = (e) => {
            e.stopPropagation();
            currentIdx = (currentIdx - 1 + slides.length) % slides.length;
            updateSlides();
        };

        document.getElementById('next-slide').onclick = (e) => {
            e.stopPropagation();
            currentIdx = (currentIdx + 1) % slides.length;
            updateSlides();
        };

        modal.onclick = (e) => { if (e.target === modal) closeBtn.click(); };
    });
  </script>
</body>
</html>
